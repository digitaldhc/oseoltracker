<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OS End-of-Life Tracker</title>
  <style>
    /* ── Global ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Segoe UI", Arial, sans-serif;
      background: #0f1117;
      color: #e2e8f0;
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    h1 {
      text-align: center;
      font-size: 1.8rem;
      margin-bottom: 0.4rem;
      color: #93c5fd;
    }

    #timezone-info {
      text-align: center;
      font-size: 0.85rem;
      color: #94a3b8;
      margin-bottom: 2rem;
    }

    /* ── Sections ── */
    .os-section {
      max-width: 1200px;
      margin: 0 auto 2.5rem;
    }

    .section-title {
      font-size: 1.3rem;
      font-weight: 600;
      color: #cbd5e1;
      margin-bottom: 1.25rem;
      text-transform: capitalize;
      padding-bottom: 0.5rem;
      border-bottom: 2px solid #334155;
    }

    /* ── Grid ── */
    #cards {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.25rem;
    }

    /* ── Card ── */
    .card {
      background: #1e2130;
      border-radius: 12px;
      padding: 1.25rem 1.5rem;
      border-left: 5px solid #64748b;
      transition: transform 0.15s ease;
    }
    .card:hover { transform: translateY(-2px); }

    /* Status colours */
    .card.eol      { border-left-color: #ef4444; }   /* already EOL – red   */
    .card.soon     { border-left-color: #f59e0b; }   /* < 180 days  – amber */
    .card.ok       { border-left-color: #22c55e; }   /* supported   – green */

    .card-name {
      font-size: 1.05rem;
      font-weight: 600;
      margin-bottom: 0.2rem;
    }

    .card-eol-date {
      font-size: 0.8rem;
      color: #94a3b8;
      margin-bottom: 0.8rem;
    }

    .card-status {
      display: inline-block;
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.2rem 0.55rem;
      border-radius: 4px;
      margin-bottom: 0.75rem;
    }
    .eol  .card-status { background: #7f1d1d; color: #fca5a5; }
    .soon .card-status { background: #78350f; color: #fcd34d; }
    .ok   .card-status { background: #14532d; color: #86efac; }

    .card-countdown {
      font-size: 1.35rem;
      font-weight: 700;
      letter-spacing: 0.02em;
      line-height: 1.3;
    }

    .card-units {
      display: flex;
      gap: 1rem;
      margin-top: 0.4rem;
    }
    .unit {
      text-align: center;
    }
    .unit-value {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
    }
    .unit-label {
      font-size: 0.65rem;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    /* Note below name (e.g. edition qualifier) */
    .card-note {
      font-size: 0.75rem;
      color: #64748b;
      margin-bottom: 0.3rem;
    }

    footer {
      text-align: center;
      margin-top: 2.5rem;
      font-size: 0.75rem;
      color: #475569;
    }
  </style>
</head>
<body>

<h1>OS End-of-Life Tracker</h1>
<p id="timezone-info">Loading timezone…</p>

<div id="os-sections"></div>

<footer>Dates sourced from Microsoft Lifecycle Policy. Extended support end dates used where applicable. This application was generated by artificial intelligence and is only intended for internal use within Dorset HealthCare University NHS Foundation Trust</footer>

<script>
  // ─────────────────────────────────────────────────────────────────
  //  DATA
  //  Add, remove, or edit entries in this array to customise the app.
  //
  //  Fields:
  //    type      – "server" or "endpoint"
  //    name      – Display name shown on the card
  //    eolDate   – End-of-life date as "YYYY-MM-DD" (uses local midnight)
  //    note      – (optional) Small sub-text, e.g. edition qualifier
  // ─────────────────────────────────────────────────────────────────
  const SOFTWARE = [
    {
      type: "server",
      name: "Windows Server 2008 R2",
      eolDate: "2020-01-14",
      note: "Extended support ended"
    },
    {
      type: "server",
      name: "Windows Server 2012 R2",
      eolDate: "2023-10-10",
      note: "Extended support ended"
    },
    {
      type: "server",
      name: "Windows Server 2016",
      eolDate: "2027-01-12",
      note: "Extended support end date"
    },
    {
      type: "server",
      name: "Windows Server 2019",
      eolDate: "2029-01-09",
      note: "Extended support end date"
    },
    {
      type: "server",
      name: "Windows Server 2022",
      eolDate: "2031-10-14",
      note: "Extended support end date"
    },
    {
      type: "server",
      name: "Windows Server 2025",
      eolDate: "2034-11-14",
      note: "Extended support end date"
    },
    {
      type: "endpoint",
      name: "Windows 10 22H2",
      eolDate: "2025-10-14",
      note: "All editions"
    },
    {
      type: "endpoint",
      name: "Windows 11 23H2",
      eolDate: "2025-11-11",
      note: "Home & Pro · Enterprise/Education: 2026-11-10"
    },
    {
      type: "endpoint",
      name: "Windows 11 24H2",
      eolDate: "2026-10-13",
      note: "Home & Pro · Enterprise/Education: 2027-10-12"
    },
    {
      type: "endpoint",
      name: "Windows 11 25H2",
      eolDate: "2027-10-12",
      note: "Home & Pro · IoT Enterprise: 2028-10-10"
    }
  ];

  // ─────────────────────────────────────────────────────────────────
  //  HELPERS
  // ─────────────────────────────────────────────────────────────────

  /**
   * Parse "YYYY-MM-DD" as a local-midnight Date object.
   * This avoids the UTC-midnight shift that new Date("YYYY-MM-DD") gives.
   */
  function parseLocalDate(str) {
    const [year, month, day] = str.split("-").map(Number);
    return new Date(year, month - 1, day);   // month is 0-indexed
  }

  /** Break a total number of whole days into years / months / days. */
  function breakdownDays(totalDays) {
    const abs = Math.abs(totalDays);
    const years  = Math.floor(abs / 365);
    const months = Math.floor((abs % 365) / 30);
    const days   = Math.floor(abs % 30);
    return { years, months, days };
  }

  /** Return the IANA time-zone name for display, falling back to "UTC". */
  function getTimezoneLabel() {
    try {
      return Intl.DateTimeFormat().resolvedOptions().timeZone;
    } catch (e) {
      return "UTC";
    }
  }

  // ─────────────────────────────────────────────────────────────────
  //  CARD BUILDER
  // ─────────────────────────────────────────────────────────────────
  function buildCards() {
    const container = document.getElementById("os-sections");
    container.innerHTML = "";

    const now = new Date();

    // Group software by type
    const grouped = {};
    SOFTWARE.forEach(item => {
      if (!grouped[item.type]) grouped[item.type] = [];
      grouped[item.type].push(item);
    });

    // Render sections in order: server, endpoint
    const order = ["server", "endpoint"];
    order.forEach(type => {
      if (!grouped[type]) return;

      // Create section container
      const section = document.createElement("div");
      section.className = "os-section";

      // Add section title
      const title = document.createElement("h2");
      title.className = "section-title";
      title.textContent = type === "server" ? "Server Operating Systems" : "Endpoint Operating Systems";
      section.appendChild(title);

      // Create cards container
      const cardsContainer = document.createElement("div");
      cardsContainer.id = `cards-${type}`;
      cardsContainer.className = "cards-grid";

      // Build cards for this type
      grouped[type].forEach(item => {
        const eol      = parseLocalDate(item.eolDate);
        const diffMs   = eol - now;
        const diffDays = Math.ceil(diffMs / (1000 * 60 * 60 * 24));

        // Determine card status
        let status, statusLabel;
        if (diffDays <= 0) {
          status = "eol";
          statusLabel = "End of Life";
        } else if (diffDays <= 180) {
          status = "soon";
          statusLabel = "Ending Soon";
        } else {
          status = "ok";
          statusLabel = "Supported";
        }

        // Human-readable EOL date string
        const eolFormatted = eol.toLocaleDateString(undefined, {
          year: "numeric", month: "long", day: "numeric"
        });

        // Breakdown for the unit display
        const { years, months, days } = breakdownDays(diffDays);

        // Build countdown / countup label
        const direction = diffDays <= 0 ? "ago" : "remaining";

        // ── Assemble card HTML ──
        const card = document.createElement("div");
        card.className = `card ${status}`;

        card.innerHTML = `
          <div class="card-name">${item.name}</div>
          ${item.note ? `<div class="card-note">${item.note}</div>` : ""}
          <div class="card-eol-date">EOL: ${eolFormatted}</div>
          <span class="card-status">${statusLabel}</span>
          <div class="card-units">
            <div class="unit">
              <div class="unit-value" id="${item.name.replace(/\s/g,'-')}-years">${years}</div>
              <div class="unit-label">Years</div>
            </div>
            <div class="unit">
              <div class="unit-value" id="${item.name.replace(/\s/g,'-')}-months">${months}</div>
              <div class="unit-label">Months</div>
            </div>
            <div class="unit">
              <div class="unit-value" id="${item.name.replace(/\s/g,'-')}-days">${days}</div>
              <div class="unit-label">Days</div>
            </div>
            <div class="unit" style="text-align:left; align-self:flex-end; padding-bottom:0.15rem;">
              <div class="unit-label" style="font-size:0.8rem; color:#94a3b8;">${direction}</div>
            </div>
          </div>
        `;

        cardsContainer.appendChild(card);
      });

      // Add CSS for the grid
      if (!document.getElementById("cards-grid-style")) {
        const style = document.createElement("style");
        style.id = "cards-grid-style";
        style.textContent = `
          .cards-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 1.25rem;
          }
        `;
        document.head.appendChild(style);
      }

      section.appendChild(cardsContainer);
      container.appendChild(section);
    });
  }

  // ─────────────────────────────────────────────────────────────────
  //  TIMEZONE DISPLAY
  // ─────────────────────────────────────────────────────────────────
  function updateTimezoneInfo() {
    const tz = getTimezoneLabel();
    const now = new Date();
    const timeStr = now.toLocaleTimeString(undefined, { timeZoneName: "short" });
    document.getElementById("timezone-info").textContent =
      `All dates use your local time zone: ${tz} · Current time: ${timeStr}`;
  }

  // ─────────────────────────────────────────────────────────────────
  //  INIT & REFRESH
  //  Cards rebuild every minute so the countdown stays accurate.
  // ─────────────────────────────────────────────────────────────────
  buildCards();
  updateTimezoneInfo();

  setInterval(() => {
    buildCards();
    updateTimezoneInfo();
  }, 60_000);   // refresh every 60 seconds

</script>
</body>
</html>
